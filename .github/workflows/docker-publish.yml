name: Publish Docker images

on:
  push:
    tags: ['v*']
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - image: paparats-server
            dockerfile: ./packages/server/Dockerfile
          - image: paparats-indexer
            dockerfile: ./packages/indexer/Dockerfile
          - image: paparats-server
            dockerfile: ./packages/server/Dockerfile
            arm: true
          - image: paparats-indexer
            dockerfile: ./packages/indexer/Dockerfile
            arm: true

    runs-on: ${{ matrix.arm && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'release' }}
          # Suffix digests so amd64 and arm64 don't overwrite each other
          flavor: |
            suffix=${{ matrix.arm && '-arm64' || '-amd64' }}

      - name: Build and push (per-platform)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.arm && 'linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arm && 'arm64' || 'amd64' }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arm && 'arm64' || 'amd64' }}

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image: [paparats-server, paparats-indexer]

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'release' }}

      - name: Create multi-arch manifest
        run: |
          for TAG in $TAGS; do
            docker buildx imagetools create -t "$TAG" \
              "${TAG}-amd64" \
              "${TAG}-arm64"
          done
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
