# paparats-embed — llama-swap config (rendered from this template at container start)
#
# ${EMBED_TTL} is substituted by entrypoint.sh from the EMBED_TTL env var.
# TTL is seconds of idle before a model is unloaded from RAM; 0 (the default)
# means never unload. Lazy loading means a model nobody queries (e.g. the
# arch/docs text model for a code-only user) never spins up. Set a positive
# TTL to save RAM on a laptop — at the cost of cold starts and of exercising
# llama-swap's unload path (see the groups note at the bottom).
#
# Pooling is dictated by model architecture — cosine-verify against the
# reference (sentence-transformers) output before trusting a new GGUF:
#   bge-code-v1          (qwen2 decoder) -> --pooling last
#   Qwen3-Embedding-0.6b (qwen3 decoder) -> --pooling last
# Wrong pooling silently corrupts the vector space.

healthCheckTimeout: 300
startPort: 10001

macros:
  llama-embed: >
    llama-server
    --host 127.0.0.1 --port ${PORT}
    --embeddings
    --ctx-size 8192
    --batch-size 8192
    --ubatch-size 8192

models:
  # Code embeddings — bge-code-v1 (1536d, Apache-2.0). qwen2-based → --pooling
  # last. Query instruction is applied by the server on the search path
  # (documents are embedded unprefixed).
  bge-code-v1:
    cmd: |
      ${llama-embed}
      --model /models/bge-code-v1-Q8_0.gguf
      --pooling last
    ttl: ${EMBED_TTL}

  # Arch/docs text embeddings — Qwen3-Embedding-0.6B (1024d, Apache-2.0).
  # Replaces bge-m3 default; +5-8pt Recall@5 on prose (SciFact/FiQA), same dim.
  # Qwen3 decoder → --pooling last. Server applies the `Instruct: ...\nQuery:`
  # prefix on the search path; documents are embedded unprefixed. No LoRA.
  qwen3-embedding-0.6b:
    cmd: |
      ${llama-embed}
      --model /models/Qwen3-Embedding-0.6B-Q8_0.gguf
      --pooling last
    ttl: ${EMBED_TTL}

# Both models may run concurrently — one never swaps the other out. Swapping
# is llama-swap's fragile path: a client abort landing mid-swap can deadlock
# its state machine (every request then hangs until restart). TTL idle-unload
# still applies per model; set EMBED_TTL=0 to remove the unload path entirely.
groups:
  embeddings:
    swap: false
    members:
      - bge-code-v1
      - qwen3-embedding-0.6b
